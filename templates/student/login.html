<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login | KR Mangalam University Hostel</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:10px;

    background:
    linear-gradient(
        rgba(0,25,70,.78),
        rgba(0,25,70,.78)
    ),
url("https://www.krmangalam.edu.in/_next/image?url=%2Fhostels%2Fitem-4.webp&w=3840&q=75");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

}

/* ================= LOGIN CARD ================= */

.login-card{

    width:100%;
    max-width:400px;

    background:rgba(255,255,255,.16);

    backdrop-filter:blur(16px);

    border-radius:20px;

    padding:22px 24px;

    border:1px solid rgba(255,255,255,.25);

    box-shadow:0 12px 35px rgba(0,0,0,.35);

    animation:fadeUp .6s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo-box{
text-align:center;
margin-bottom:6px;
}

.logo{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

h2{
color:white;
font-weight:700;
font-size:21px;
text-align:center;
margin-bottom:3px;
}

.subtitle{
color:#eee;
text-align:center;
font-size:12px;
margin-bottom:14px;
line-height:1.5;
}

/* Error Alert */

.alert{
font-size:13px;
border-radius:10px;
}

.input-group{
margin-bottom:12px;
}

.input-group-text{

width:36px;
height:36px;

display:flex;
justify-content:center;
align-items:center;

background:#0d6efd;
color:white;

border:none;

font-size:13px;

}

.form-control{

height:36px;

font-size:13px;

border:none;

border-radius:0 8px 8px 0;

}

.form-control:focus{

box-shadow:0 0 7px rgba(255,193,7,.45);

}

.login-btn{

height:38px;

font-size:14px;

font-weight:600;

border-radius:8px;

transition:.3s;

}

.login-btn:hover{

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(13,110,253,.4);

}

.register-link{

color:white;

font-weight:600;

text-decoration:none;

}

.register-link:hover{

color:#ffc107;

}

.home-btn{

height:35px;

font-size:13px;

font-weight:600;

border-radius:8px;

}

.footer{

text-align:center;

color:#ddd;

font-size:11px;

margin-top:12px;

}

@media(max-width:768px){

.login-card{

padding:18px;

}

h2{

font-size:19px;

}

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo-box">

<img src="https://i.pinimg.com/736x/81/e7/75/81e7754d22e0094165e78e4f091eb404.jpg"
class="logo"
alt="KR Mangalam University Hostel">

</div>

<h2>

Student Login

</h2>

<p class="subtitle">

<i class="fa-solid fa-building-columns"></i>

&nbsp;

Hostel Leave Management System

<br>

K.R. Mangalam University

</p>

{% if error %}

<div class="alert alert-danger text-center py-2 mb-3">

<i class="fa-solid fa-circle-exclamation me-2"></i>

{{ error }}

</div>

{% endif %}

<form method="POST">

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-envelope"></i>

</span>

<input
type="email"
name="email"
class="form-control"
placeholder="University Email"
required>
</div>

<!-- ================= PASSWORD ================= -->

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
id="password"
name="password"
class="form-control"
placeholder="Password"
required>

<button
type="button"
class="btn btn-light px-2"
onclick="showPassword()">

<i id="eye" class="fa-solid fa-eye"></i>

</button>

</div>

<!-- ================= LOGIN BUTTON ================= -->

<div class="d-grid">

<button
type="submit"
class="btn btn-primary login-btn">

<i class="fa-solid fa-right-to-bracket"></i>

&nbsp;

Login

</button>

</div>

</form>

<!-- ================= REGISTER ================= -->

<div class="text-center mt-3">

<p class="text-white small mb-1">

New Student?

</p>

<a
href="{{ url_for('register') }}"
class="register-link">

<i class="fa-solid fa-user-plus"></i>

&nbsp;

Register Here

</a>

</div>

<!-- ================= HOME BUTTON ================= -->

<div class="d-grid mt-2">

<a
href="{{ url_for('home') }}"
class="btn btn-outline-light home-btn">

<i class="fa-solid fa-house"></i>

&nbsp;

Back to Home

</a>

</div>

<!-- ================= FOOTER ================= -->

<div class="footer">

<i class="fa-solid fa-shield-halved"></i>

&nbsp;

© 2026 K.R. Mangalam University

<br>

Hostel Leave Management System

</div>

</div>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

function showPassword(){

const pass=document.getElementById("password");
const eye=document.getElementById("eye");

if(pass.type==="password"){

pass.type="text";

eye.classList.remove("fa-eye");
eye.classList.add("fa-eye-slash");

}
else{

pass.type="password";

eye.classList.remove("fa-eye-slash");
eye.classList.add("fa-eye");

}

}

window.onload=function(){

document.querySelector('input[name="email"]').focus();

};

// =========================
// AUTO HIDE ERROR ALERT
// =========================

setTimeout(function(){

const alert=document.querySelector(".alert");

if(alert){

alert.style.transition="opacity 0.5s";

alert.style.opacity="0";

setTimeout(function(){

alert.remove();

},500);

}

},3000);

</script>

</body>

</html>
