<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Student Registration | KR Mangalam University Hostel
</title>


<!-- Bootstrap 5.3.3 -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">



<!-- Font Awesome -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">



<!-- Google Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">



<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}



body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:8px;


background:

linear-gradient(
rgba(0,25,70,0.78),
rgba(0,25,70,0.78)
),


url("https://www.krmangalam.edu.in/_next/image?url=%2Fhostels%2Fitem-4.webp&w=3840&q=75");


background-size:cover;

background-position:center;

background-attachment:fixed;

}



/* ================= CARD ================= */


.register-card{


width:100%;


max-width:720px;


background:

rgba(255,255,255,0.16);



backdrop-filter:blur(16px);



border-radius:20px;



padding:14px 22px;



border:

1px solid rgba(255,255,255,0.25);



box-shadow:

0 12px 35px rgba(0,0,0,0.35);



animation:fadeUp .6s ease;


}





@keyframes fadeUp{


from{

opacity:0;

transform:translateY(25px);

}


to{

opacity:1;

transform:translateY(0);

}


}






/* ================= LOGO ================= */


.logo{


width:42px;


height:42px;



object-fit:cover;



border-radius:50%;



display:block;



margin:0 auto 4px;



}






/* ================= TITLE ================= */


h2{


color:white;


font-weight:700;


font-size:19px;


text-align:center;


margin-bottom:3px;


}



.subtitle{


color:#eee;


text-align:center;


font-size:11px;


margin-bottom:8px;


}





/* ================= INPUTS ================= */


.input-group{


margin-bottom:3px;


}



.form-label{


font-size:11px;


font-weight:500;


color:white;


margin-bottom:1px;


}




.input-group-text{


width:34px;


height:34px;


display:flex;


justify-content:center;


align-items:center;


background:#0d6efd;


color:white;


border:none;


font-size:12px;


}




.form-control,
.form-select{


height:34px;


font-size:12px;


border:none;


border-radius:0 8px 8px 0;


}





.form-control:focus,
.form-select:focus{


box-shadow:

0 0 7px rgba(255,193,7,.45);


}






/* ================= BUTTONS ================= */


.btn-register{


height:36px;


font-size:13px;


border-radius:8px;


font-weight:600;


transition:.3s;


}





.btn-register:hover{


transform:translateY(-2px);


box-shadow:

0 8px 20px rgba(13,110,253,.4);


}




.home-btn{


height:34px;


font-size:13px;


border-radius:8px;


font-weight:600;


}





.login-link{


color:white;


font-weight:600;


text-decoration:none;


}



.login-link:hover{


color:#ffc107;


}





.footer{


text-align:center;


color:#ddd;


font-size:10px;


margin-top:5px;


}



@media(max-width:768px){


.register-card{


padding:12px 15px;


}



h2{


font-size:18px;


}


}



</style>

</head>


<body>


<div class="register-card">
    <!-- LOGO -->


<img src="https://www.krmangalam.edu.in/_next/image?url=%2Fhostels%2Fitem-4.webp&w=3840&q=75"

class="logo"

alt="KR Mangalam University Hostel">






<h2>

Create Student Account

</h2>




<p class="subtitle">


<i class="fa-solid fa-building-columns"></i>

&nbsp;


Hostel Leave Management System


<br>


K.R. Mangalam University


</p>






<!-- ================= REGISTRATION FORM ================= -->


<form method="POST" id="registerForm">



<div class="row g-2">






<!-- FULL NAME -->


<div class="col-md-6">


<label class="form-label">

Full Name

</label>



<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-user"></i>

</span>




<input type="text"

class="form-control"

name="name"

placeholder="Enter Full Name"

required>



</div>


</div>








<!-- ROLL NUMBER -->


<div class="col-md-6">


<label class="form-label">

Roll Number

</label>




<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-id-card"></i>

</span>




<input type="text"

class="form-control"

name="roll_no"

placeholder="240120XXXX"

required>



</div>


</div>








<!-- EMAIL -->


<div class="col-md-6">


<label class="form-label">

University Email

</label>




<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-envelope"></i>

</span>




<input type="email"

class="form-control"

name="email"

placeholder="example@krmangalam.edu.in"

required>




</div>


</div>








<!-- PHONE -->


<div class="col-md-6">


<label class="form-label">

Mobile Number

</label>



<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-phone"></i>

</span>




<input type="text"

class="form-control"

name="phone"

maxlength="10"

placeholder="9876543210"

required>



</div>


</div>








<!-- HOSTEL -->


<div class="col-md-6">


<label class="form-label">

Hostel Block

</label>




<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-building"></i>

</span>





<select class="form-select"

name="hostel"

required>



<option value="">

Select Hostel

</option>



<option>

Boys Hostel A

</option>



<option>

Boys Hostel B

</option>



<option>

Girls Hostel A

</option>



<option>

Girls Hostel B

</option>




</select>



</div>


</div>








<!-- ROOM -->


<div class="col-md-6">


<label class="form-label">

Room Number

</label>



<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-bed"></i>

</span>




<input type="text"

class="form-control"

name="room"

placeholder="Room No."

required>



</div>


</div>








<!-- COURSE -->


<div class="col-md-6">


<label class="form-label">

Course

</label>




<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-graduation-cap"></i>

</span>




<input type="text"

class="form-control"

name="course"

placeholder="B.Tech CSE"

required>




</div>


</div>








<!-- YEAR -->


<div class="col-md-6">


<label class="form-label">

Year

</label>




<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-calendar-days"></i>

</span>





<select class="form-select"

name="year"

required>




<option value="">

Select Year

</option>




<option>

1st Year

</option>




<option>

2nd Year

</option>




<option>

3rd Year

</option>




<option>

4th Year

</option>




</select>




</div>


</div>








<!-- PASSWORD -->


<div class="col-md-6">


<label class="form-label">

Password

</label>




<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>





<input type="password"

id="password"

class="form-control"

name="password"

placeholder="Create Password"

required>





<button class="btn btn-light px-2"

type="button"

onclick="togglePassword('password','eye1')">



<i id="eye1"

class="fa-solid fa-eye">

</i>



</button>



</div>


</div>
<!-- CONFIRM PASSWORD -->


<div class="col-md-6">


<label class="form-label">

Confirm Password

</label>




<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>





<input type="password"

id="confirm_password"

class="form-control"

name="confirm_password"

placeholder="Confirm Password"

required>





<button class="btn btn-light px-2"

type="button"

onclick="togglePassword('confirm_password','eye2')">



<i id="eye2"

class="fa-solid fa-eye">

</i>



</button>



</div>


</div>





</div>






<!-- ================= REGISTER BUTTON ================= -->


<div class="d-grid mt-2">


<button type="submit"

class="btn btn-primary btn-register">


<i class="fa-solid fa-user-plus"></i>

&nbsp;

Register Now


</button>


</div>





</form>









<!-- ================= LOGIN SECTION ================= -->



<div class="text-center mt-2">



<p class="text-white small mb-1">


Already have an account?


</p>





<a href="{{ url_for('login') }}"

class="login-link">



<i class="fa-solid fa-right-to-bracket"></i>

&nbsp;


Login Here



</a>




</div>









<!-- ================= ACTION BUTTONS ================= -->



<div class="row mt-2 g-2">





<div class="col-md-6">



<a href="{{ url_for('home') }}"

class="btn btn-outline-light home-btn w-100">



<i class="fa-solid fa-house"></i>

&nbsp;


Back to Home



</a>



</div>








<div class="col-md-6">



<button type="reset"

form="registerForm"

class="btn btn-warning home-btn w-100">



<i class="fa-solid fa-rotate-left"></i>

&nbsp;


Reset Form


</button>



</div>




</div>






<!-- ================= FOOTER ================= -->


<div class="footer">



<i class="fa-solid fa-shield-halved"></i>

&nbsp;


© 2026 K.R. Mangalam University



<br>



Hostel Leave Management System



</div>





</div>






<!-- ================= BOOTSTRAP JS ================= -->


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

</script>








<script>



// =========================
// SHOW / HIDE PASSWORD
// =========================



function togglePassword(fieldId, iconId){



const field = document.getElementById(fieldId);


const icon = document.getElementById(iconId);





if(field.type === "password"){



field.type = "text";



icon.classList.remove("fa-eye");

icon.classList.add("fa-eye-slash");



}



else{



field.type = "password";



icon.classList.remove("fa-eye-slash");

icon.classList.add("fa-eye");



}



}











// =========================
// PASSWORD VALIDATION
// =========================



const form = document.getElementById("registerForm");





form.addEventListener("submit", function(e){



const password = document

.getElementById("password")

.value

.trim();





const confirmPassword = document

.getElementById("confirm_password")

.value

.trim();







if(password.length < 8){



e.preventDefault();



alert("Password must contain at least 8 characters.");



return;



}








if(password !== confirmPassword){



e.preventDefault();



alert("Passwords do not match.");



return;



}



});












// =========================
// AUTO FOCUS
// =========================



window.onload = function(){



document

.querySelector('input[name="name"]')

.focus();



};







</script>





</body>


</html>
