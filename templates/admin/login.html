<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warden Login | KR Mangalam University Hostel</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:10px;

    background:
    linear-gradient(
        rgba(0,25,70,.82),
        rgba(0,25,70,.82)
    ),
    url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHYOpvBx4JuFem1_zlfFz2OYpXViCkDh-zT3MHcWYg0z4GjekZ5zK6S0A&s=10");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

}

/* ================= LOGIN CARD ================= */

.login-card{

    width:100%;
    max-width:400px;

    background:rgba(255,255,255,.16);

    backdrop-filter:blur(16px);

    border-radius:20px;

    padding:22px 24px;

    border:1px solid rgba(255,255,255,.25);

    box-shadow:0 12px 35px rgba(0,0,0,.35);

    animation:fadeUp .6s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* ================= LOGO ================= */

.logo-box{

text-align:center;
margin-bottom:6px;

}

.logo{

width:45px;
height:45px;

border-radius:50%;

object-fit:cover;

}

/* ================= TITLE ================= */

h2{

color:white;

font-weight:700;

font-size:21px;

text-align:center;

margin-bottom:3px;

}

.subtitle{

color:#eee;

text-align:center;

font-size:12px;

margin-bottom:14px;

line-height:1.5;

}

/* ================= ADMIN BADGE ================= */

.admin-badge{

display:inline-block;

background:#198754;

color:white;

padding:6px 14px;

border-radius:30px;

font-size:11px;

font-weight:600;

margin-bottom:12px;

}

/* ================= ERROR ALERT ================= */

.alert{

font-size:13px;

border-radius:10px;

}

/* ================= INPUTS ================= */

.input-group{

margin-bottom:12px;

}

.input-group-text{

width:36px;

height:36px;

display:flex;

justify-content:center;

align-items:center;

background:#0d6efd;

color:white;

border:none;

font-size:13px;

}

.form-control{

height:36px;

font-size:13px;

border:none;

border-radius:0 8px 8px 0;

}

.form-control:focus{

box-shadow:0 0 7px rgba(255,193,7,.45);

}

/* ================= BUTTON ================= */

.login-btn{

height:38px;

font-size:14px;

font-weight:600;

border-radius:8px;

transition:.3s;

}

.login-btn:hover{

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(13,110,253,.4);

}

/* ================= HOME BUTTON ================= */

.home-btn{

height:35px;

font-size:13px;

font-weight:600;

border-radius:8px;

}

/* ================= FOOTER ================= */

.footer{

text-align:center;

color:#ddd;

font-size:11px;

margin-top:12px;

}

@media(max-width:768px){

.login-card{

padding:18px;

}

h2{

font-size:19px;

}

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo-box">

<img src="https://i.pinimg.com/736x/81/e7/75/81e7754d22e0094165e78e4f091eb404.jpg"
class="logo"
alt="KR Mangalam University Hostel">

</div>

<div class="text-center">

<span class="admin-badge">

<i class="fa-solid fa-user-shield"></i>

&nbsp;

AUTHORIZED WARDEN ACCESS

</span>

</div>

<h2>

Warden Login

</h2>

<p class="subtitle">

<i class="fa-solid fa-building-columns"></i>

&nbsp;

Hostel Leave Management System

<br>

K.R. Mangalam University

</p>

{% if error %}

<div class="alert alert-danger alert-dismissible fade show text-center py-2 mb-3" role="alert">

<i class="fa-solid fa-circle-exclamation me-2"></i>

{{ error }}


</div>

{% endif %}

<form method="POST">

<!-- Username -->

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-user"></i>

</span>

<input
type="text"
name="username"
class="form-control"
placeholder="Warden Username"
required>
</div>

<!-- Password -->

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
id="password"
name="password"
class="form-control"
placeholder="Password"
required>

<button
type="button"
class="btn btn-light px-2"
onclick="showPassword()">

<i id="eye" class="fa-solid fa-eye"></i>

</button>

</div>

<div class="d-grid">

<button
type="submit"
class="btn btn-primary login-btn">

<i class="fa-solid fa-right-to-bracket"></i>

&nbsp;

Login

</button>

</div>

</form>

<!-- ================= HOME BUTTON ================= -->

<div class="d-grid mt-2">

<a
href="{{ url_for('home') }}"
class="btn btn-outline-light home-btn">

<i class="fa-solid fa-house"></i>

&nbsp;

Back to Home

</a>

</div>

<!-- ================= FOOTER ================= -->

<div class="footer">

<i class="fa-solid fa-shield-halved"></i>

&nbsp;

© 2026 K.R. Mangalam University

<br>

Hostel Leave Management System | Warden Panel

</div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

function showPassword(){

const pass = document.getElementById("password");
const eye = document.getElementById("eye");

if(pass.type === "password"){

pass.type = "text";

eye.classList.remove("fa-eye");
eye.classList.add("fa-eye-slash");

}
else{

pass.type = "password";

eye.classList.remove("fa-eye-slash");
eye.classList.add("fa-eye");

}

}

// Auto focus on username
window.onload = function(){

document.querySelector('input[name="username"]').focus();

};

// Auto-hide error alert after 3 seconds
setTimeout(function(){

const alertBox = document.querySelector(".alert");

if(alertBox){

const bsAlert = bootstrap.Alert.getOrCreateInstance(alertBox);
bsAlert.close();

}

}, 3000);

</script>

</body>

</html>
