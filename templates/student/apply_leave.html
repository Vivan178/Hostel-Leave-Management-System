<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply Leave | KR Mangalam University Hostel</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:10px;

background:
linear-gradient(
rgba(0,25,70,.80),
rgba(0,25,70,.80)
),
url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHYOpvBx4JuFem1_zlfFz2OYpXViCkDh-zT3MHcWYg0z4GjekZ5zK6S0A&s=10");

background-size:cover;
background-position:center;
background-attachment:fixed;

}

/* ================= CARD ================= */

.leave-card{

width:100%;
max-width:650px;

background:rgba(255,255,255,.16);

backdrop-filter:blur(16px);

border-radius:22px;

padding:24px 28px;

border:1px solid rgba(255,255,255,.25);

box-shadow:0 12px 35px rgba(0,0,0,.35);

animation:fadeUp .6s ease;

}

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(25px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* ================= LOGO ================= */

.logo-box{

text-align:center;
margin-bottom:8px;

}

.logo{

width:48px;
height:48px;

border-radius:50%;

object-fit:cover;

}

/* ================= TITLE ================= */

h2{

color:white;

font-size:22px;

font-weight:700;

text-align:center;

margin-bottom:4px;

}

.subtitle{

color:#eee;

text-align:center;

font-size:12px;

margin-bottom:18px;

line-height:1.5;

}

/* ================= FORM ================= */

.form-label{

font-size:12px;

font-weight:500;

color:white;

margin-bottom:4px;

}

.input-group{

margin-bottom:12px;

}

.input-group-text{

width:38px;
height:38px;

display:flex;
justify-content:center;
align-items:center;

background:#0d6efd;

color:white;

border:none;

font-size:13px;

}

.form-control{

height:38px;

font-size:13px;

border:none;

border-radius:0 8px 8px 0;

}

.form-control:focus{

box-shadow:0 0 8px rgba(255,193,7,.45);

}

textarea.form-control{

height:110px;

resize:none;

padding-top:10px;

}
/* ================= BUTTONS ================= */

.submit-btn{

height:40px;

font-size:14px;

font-weight:600;

border-radius:8px;

transition:.3s;

}

.submit-btn:hover{

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(13,110,253,.4);

}

.back-btn{

height:36px;

font-size:13px;

font-weight:600;

border-radius:8px;

}

.reset-btn{

height:36px;

font-size:13px;

font-weight:600;

border-radius:8px;

}

.footer{

text-align:center;

color:#ddd;

font-size:11px;

margin-top:12px;

}

@media(max-width:768px){

.leave-card{

padding:18px;

}

h2{

font-size:19px;

}

}

</style>

</head>

<body>

<div class="leave-card">

<!-- ================= LOGO ================= -->

<div class="logo-box">

<img src="https://i.pinimg.com/736x/81/e7/75/81e7754d22e0094165e78e4f091eb404.jpg"
class="logo"
alt="KR Mangalam University Hostel">

</div>

<!-- ================= TITLE ================= -->

<h2>

Apply Hostel Leave

</h2>

<p class="subtitle">

<i class="fa-solid fa-building-columns"></i>

&nbsp;

Hostel Leave Management System

<br>

K.R. Mangalam University

</p>

<!-- ================= FORM ================= -->

<form method="POST" id="leaveForm">

<label class="form-label">

Reason for Leave

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-file-lines"></i>

</span>

<textarea
name="reason"
class="form-control"
placeholder="Enter reason for leave..."
required></textarea>

</div>

<div class="row">

<div class="col-md-6">

<label class="form-label">

From Date

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-calendar-days"></i>

</span>

<input
type="date"
name="from_date"
class="form-control"
required>

</div>

</div>

<div class="col-md-6">

<label class="form-label">

To Date

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-calendar-check"></i>

</span>

<input
type="date"
name="to_date"
class="form-control"
required>

</div>

</div>

</div>
<!-- ================= SUBMIT BUTTON ================= -->

<div class="d-grid mt-3">

<button
type="submit"
class="btn btn-primary submit-btn">

<i class="fa-solid fa-paper-plane"></i>

&nbsp;

Submit Leave Request

</button>

</div>

</form>

<!-- ================= ACTION BUTTONS ================= -->

<div class="row mt-2 g-2">

<div class="col-md-6">

<a
href="{{ url_for('dashboard') }}"
class="btn btn-outline-light back-btn w-100">

<i class="fa-solid fa-arrow-left"></i>

&nbsp;

Back to Dashboard

</a>

</div>

<div class="col-md-6">

<button
type="reset"
form="leaveForm"
class="btn btn-warning reset-btn w-100">

<i class="fa-solid fa-rotate-left"></i>

&nbsp;

Reset Form

</button>

</div>

</div>

<!-- ================= FOOTER ================= -->

<div class="footer">

<i class="fa-solid fa-shield-halved"></i>

&nbsp;

© 2026 K.R. Mangalam University

<br>

Hostel Leave Management System

</div>

</div>

<!-- ================= BOOTSTRAP ================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// =========================
// AUTO FOCUS
// =========================

window.onload = function(){

document.querySelector('textarea[name="reason"]').focus();

};

// =========================
// DATE VALIDATION
// =========================

const form = document.getElementById("leaveForm");

form.addEventListener("submit", function(e){

const fromDate = document.querySelector('input[name="from_date"]').value;
const toDate = document.querySelector('input[name="to_date"]').value;

if(fromDate && toDate && toDate < fromDate){

e.preventDefault();

alert("To Date cannot be earlier than From Date.");

return;

}

});

</script>

</body>

</html>
