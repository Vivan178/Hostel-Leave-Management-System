<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Change Password | KR Mangalam University Hostel
</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Font Awesome -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Google Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:15px;

background:
linear-gradient(
rgba(0,25,70,.82),
rgba(0,25,70,.82)
),

url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHYOpvBx4JuFem1_zlfFz2OYpXViCkDh-zT3MHcWYg0z4GjekZ5zK6S0A&s=10");

background-size:cover;
background-position:center;
background-attachment:fixed;

}

.password-card{

width:100%;
max-width:430px;

background:rgba(255,255,255,.16);

backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,.25);

border-radius:20px;

padding:24px;

box-shadow:0 15px 35px rgba(0,0,0,.35);

animation:fadeUp .6s ease;

}

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.logo{

width:52px;
height:52px;

display:block;

margin:auto;

border-radius:50%;

object-fit:cover;

}

h2{

margin-top:10px;

text-align:center;

color:white;

font-size:22px;

font-weight:700;

}

.subtitle{

text-align:center;

font-size:12px;

color:#eee;

line-height:1.6;

margin-bottom:18px;

}

.alert{

font-size:13px;

border-radius:8px;

margin-bottom:15px;

animation:fadeUp .3s;

}

.input-group{

margin-bottom:14px;

}

.input-group-text{

width:40px;

display:flex;
justify-content:center;
align-items:center;

background:#0d6efd;

color:white;

border:none;

}

.form-control{

height:40px;

border:none;

font-size:13px;

}

.form-control:focus{

box-shadow:0 0 8px rgba(255,193,7,.45);

}

.password-btn{

height:42px;

font-size:14px;

font-weight:600;

border-radius:8px;

transition:.3s;

}

.password-btn:hover{

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(13,110,253,.35);

}

.back-btn{

height:38px;

font-size:13px;

font-weight:600;

border-radius:8px;

}

.footer{

margin-top:15px;

text-align:center;

font-size:11px;

color:#ddd;

}

@media(max-width:768px){

.password-card{

padding:20px;

}

}

</style>

</head>

<body>

<div class="password-card">

<img
src="https://i.pinimg.com/736x/81/e7/75/81e7754d22e0094165e78e4f091eb404.jpg"
class="logo"
alt="Logo">

<h2>Change Password</h2>

<p class="subtitle">

<i class="fa-solid fa-building-columns"></i>

Hostel Leave Management System

<br>

K.R. Mangalam University

</p>

<!-- SUCCESS MESSAGE -->

{% if success %}

<div id="successMessage" class="alert alert-success text-center">

<i class="fa-solid fa-circle-check"></i>

{{ success }}

</div>

{% endif %}

<!-- MULTIPLE ERROR MESSAGES -->

{% if errors %}

<div id="errorMessage" class="alert alert-danger">

{% for error in errors %}

<div class="mb-1">

<i class="fa-solid fa-circle-xmark"></i>

{{ error }}

</div>

{% endfor %}

</div>

{% endif %}

<form method="POST" id="passwordForm">
    <!-- ================= CURRENT PASSWORD ================= -->

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
id="old_password"
name="old_password"
class="form-control"
placeholder="Current Password"
required>

<button
type="button"
class="btn btn-light px-2"
onclick="togglePassword('old_password','eye1')">

<i id="eye1" class="fa-solid fa-eye"></i>

</button>

</div>

<!-- ================= NEW PASSWORD ================= -->

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-key"></i>

</span>

<input
type="password"
id="new_password"
name="new_password"
class="form-control"
placeholder="New Password"
required>

<button
type="button"
class="btn btn-light px-2"
onclick="togglePassword('new_password','eye2')">

<i id="eye2" class="fa-solid fa-eye"></i>

</button>

</div>

<!-- ================= CONFIRM PASSWORD ================= -->

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-check"></i>

</span>

<input
type="password"
id="confirm_password"
name="confirm_password"
class="form-control"
placeholder="Confirm New Password"
required>

<button
type="button"
class="btn btn-light px-2"
onclick="togglePassword('confirm_password','eye3')">

<i id="eye3" class="fa-solid fa-eye"></i>

</button>

</div>

<div class="d-grid mt-3">

<button
type="submit"
class="btn btn-primary password-btn">

<i class="fa-solid fa-shield-halved"></i>

&nbsp;

Update Password

</button>

</div>

</form>

<!-- ================= BACK BUTTON ================= -->

<div class="d-grid mt-3">

<a
href="{{ url_for('profile') }}"
class="btn btn-outline-light back-btn">

<i class="fa-solid fa-arrow-left"></i>

&nbsp;

Back to Profile

</a>

</div>

<!-- ================= FOOTER ================= -->

<div class="footer">

<i class="fa-solid fa-shield-halved"></i>

&nbsp;

© 2026 K.R. Mangalam University

<br>

Hostel Leave Management System

</div>

</div>
<!-- ================= BOOTSTRAP ================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// ======================================
// SHOW / HIDE PASSWORD
// ======================================

function togglePassword(fieldId, eyeId){

const field = document.getElementById(fieldId);

const eye = document.getElementById(eyeId);

if(field.type === "password"){

field.type = "text";

eye.classList.remove("fa-eye");
eye.classList.add("fa-eye-slash");

}

else{

field.type = "password";

eye.classList.remove("fa-eye-slash");
eye.classList.add("fa-eye");

}

}

// ======================================
// FORM VALIDATION
// ======================================

document.getElementById("passwordForm").addEventListener("submit", function(e){

const oldPassword = document.getElementById("old_password").value.trim();

const newPassword = document.getElementById("new_password").value.trim();

const confirmPassword = document.getElementById("confirm_password").value.trim();

if(oldPassword === ""){

e.preventDefault();

alert("Please enter your current password.");

return;

}

if(newPassword.length < 8){

e.preventDefault();

alert("New Password must contain at least 8 characters.");

return;

}

});

// ======================================
// AUTO FOCUS
// ======================================

window.onload = function(){

document.getElementById("old_password").focus();

};

// ======================================
// SUCCESS MESSAGE
// ======================================

const success = document.getElementById("successMessage");

if(success){

setTimeout(function(){

success.style.transition = "opacity .3s ease";

success.style.opacity = "0";

setTimeout(function(){

window.location.href = "{{ url_for('profile') }}";

},300);

},1000);

}

// ======================================
// AUTO HIDE ERROR MESSAGE
// ======================================

const errorBox = document.getElementById("errorMessage");

if(errorBox){

setTimeout(function(){

errorBox.style.transition = "opacity .4s ease";

errorBox.style.opacity = "0";

setTimeout(function(){

errorBox.remove();

},400);

},3000);

}

</script>

</body>

</html>
